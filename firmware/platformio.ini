[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

upload_port = COM7
monitor_port = COM7
monitor_speed = 115200
upload_speed = 921600

lib_deps =
  adafruit/DHT sensor library
  adafruit/Adafruit Unified Sensor
  adafruit/Adafruit SSD1306
  adafruit/Adafruit GFX Library
  bblanchon/ArduinoJson